let katexReady = false;
let detailGrouped = {};

function selectDate(date) {
  if (!detailGrouped[date]) return;
  document.querySelectorAll('.date-tab').forEach(t => {
    t.classList.toggle('active', t.dataset.date === date);
  });
  renderTrendPanel(detailGrouped, date);
  renderCards(date, detailGrouped);
}

function initDetailPage() {
  detailInited = true;
  const grouped = {};
  wrongQuestions.forEach(q => {
    if (!grouped[q.date]) grouped[q.date] = [];
    grouped[q.date].push(q);
  });
  detailGrouped = grouped;
  const dates = Object.keys(grouped).sort().reverse();

  document.getElementById('totalCount').textContent = wrongQuestions.length;
  const sidebar = document.getElementById('dateSidebar');
  renderSubjectStrip();

  dates.forEach((date, i) => {
    const count = grouped[date].length;
    const tab = document.createElement('div');
    tab.className = 'date-tab' + (i === 0 ? ' active' : '');
    tab.dataset.date = date;
    tab.innerHTML = `
      <span class="date-dot"></span>
      <span>${date.slice(5)}</span>
      <span class="date-count">${count}题</span>
    `;
    tab.onclick = () => selectDate(date);
    sidebar.appendChild(tab);
  });

  // Select the date with pendingQid, or first date
  const targetDate = pendingQid ? qidIndex[pendingQid]?.date : null;
  const initialDate = targetDate || dates[0];

  // Activate the correct date tab
  if (targetDate) {
    const tabs = sidebar.querySelectorAll('.date-tab');
    tabs.forEach(t => {
      t.classList.toggle('active', t.dataset.date === targetDate);
    });
  }

  if (dates.length > 0) selectDate(initialDate);
}

function normalizeLatexSegment(segment) {
  var t = segment || '';
  var wrap = function(match) { return '$' + match + '$'; };
  t = t.replace(/\\\(([\s\S]*?)\\\)/g, wrap);
  t = t.replace(/\\\[([\s\S]*?)\\\]/g, wrap);
  t = t.replace(/\\begin\{(?:cases|matrix|pmatrix|bmatrix|vmatrix|Vmatrix|aligned)\}[\s\S]*?\\end\{(?:cases|matrix|pmatrix|bmatrix|vmatrix|Vmatrix|aligned)\}/g, wrap);
  t = t.replace(/\\frac\{(?:[^{}]|\{[^{}]*\})*\}\{(?:[^{}]|\{[^{}]*\})*\}|\\sqrt\{(?:[^{}]|\{[^{}]*\})*\}|\\(?:lim|int|sum|prod|sin|cos|tan|ln|log|exp|max|min|partial|infty|pi|xi|theta|varphi|rho|Omega|cdot|to|leq|geq|neq|sim|approx)\b/g, wrap);
  return t;
}

function fixLatex(text) {
  if (!text) return '';
  // Preserve existing $...$ blocks, and only wrap bare LaTeX around them.
  var parts = String(text).split(/(\$\$[\s\S]*?\$\$|\$[^$\n]+?\$)/g);
  for (var i = 0; i < parts.length; i += 2) {
    parts[i] = normalizeLatexSegment(parts[i]);
  }
  return parts.join('');
}

function renderCards(date, grouped) {
  const cards = grouped[date].sort((a,b) => a.qid - b.qid);
  const stage = document.getElementById('scrollStage');
  const total = cards.length;
  const active = cards.filter(q => q.status === 'active').length;

  let html = `
    <div class="date-group-header">
      ${date} <span class="badge">${total} 道 · ${active} 道待复习</span>
    </div>
  `;

  cards.forEach((q, i) => {
    const statusLabel = q.status === 'active' ? '待复习' : '已掌握';
    const statusClass = q.status === 'active' ? 'tag-errors' : 'tag-status';
    const shouldExpand = pendingQid !== null && q.qid === pendingQid;
    html += `
      <div class="error-card subject-${q.subjectKey}${shouldExpand ? ' expanded' : ''}" id="card-${q.qid}" data-mark="${q.subjectMark}">
        <div class="card-top" onclick="event.stopPropagation(); toggleCard('card-${q.qid}')" style="cursor:pointer;">
          <div class="card-index">${i + 1}</div>
          <div class="card-body">
            <div class="card-question">${q.question.replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g, '<br>')}</div>
            <div class="card-meta">
              <span class="card-tag tag-subject">${q.subjectLabel}</span>
              <span class="card-tag tag-errors">错${q.errorCount}次</span>
              <span class="card-tag ${statusClass}">${statusLabel}</span>
            </div>
          </div>
        </div>
        <div class="card-detail">
          <div class="detail-row my-answer-row">
            <div class="detail-label">我的答案 <button class="detail-edit-btn" onclick="event.stopPropagation(); startEditMyAnswer(${q.dbId})" title="编辑我的答案">✏️</button></div>
            <div class="detail-content wrong" id="ma-view-${q.dbId}">${fixLatex(stripImgNotes(q.myAnswer)).replace(/\n/g, '<br>')}${renderImages(q.images) || renderImgNotes(q.myAnswer)}</div>
            <div id="ma-edit-${q.dbId}" style="display:none">
              <textarea id="ma-ta-${q.dbId}" rows="4" style="width:100%;border:1px solid var(--border);border-radius:8px;padding:8px;font-size:0.82rem;font-family:inherit;resize:vertical;box-sizing:border-box;"></textarea>
              <div style="margin-top:6px;display:flex;gap:8px;">
                <button onclick="event.stopPropagation(); saveMyAnswerEdit(${q.dbId})" style="background:#4f46e5;color:#fff;border:none;border-radius:6px;padding:4px 12px;font-size:0.78rem;cursor:pointer;">保存</button>
                <button onclick="event.stopPropagation(); cancelMyAnswerEdit(${q.dbId})" style="background:#f1f5f9;color:#64748b;border:1px solid var(--border);border-radius:6px;padding:4px 12px;font-size:0.78rem;cursor:pointer;">取消</button>
              </div>
            </div>
          </div>
          <div class="detail-row" style="grid-column: 1 / -1;">
            <div class="detail-label">正确答案</div>
            <div class="detail-content correct detail-answer-block">${fixLatex(q.correctAnswer).replace(/\n/g, '<br>')}</div>
            ${q.explanation ? '<div class="detail-label" style="margin-top:10px;">解析</div><div class="detail-explain-block">' + fixLatex(q.explanation).replace(/\n/g, '<br>') + '</div>' : ''}
          </div>
        </div>
        <button class="card-delete-btn" onclick="event.stopPropagation(); deleteCard(${q.dbId})" title="删除此错题">✕</button>
      </div>
    `;
  });

  stage.innerHTML = html;
  stage.scrollTop = 0;

  // Scroll to target card
  if (pendingQid !== null) {
    setTimeout(() => {
      const targetCard = document.getElementById('card-' + pendingQid);
      if (targetCard) {
        targetCard.scrollIntoView({ behavior: 'smooth', block: 'center' });
      }
      pendingQid = null;
    }, 200);
  }

  if (typeof renderMathInElement !== 'undefined') {
    // Render visible content first
    renderMathInElement(stage, {
      delimiters: [
        {left:'$$', right:'$$', display:true},
        {left:'$', right:'$', display:false},
      ],
      throwOnError: false, strict: false
    });
    // Render expanded cards individually (hidden details may have been skipped)
    stage.querySelectorAll('.error-card.expanded').forEach(card => {
      renderMathInElement(card, {
        delimiters: [
          {left:'$$', right:'$$', display:true},
          {left:'$', right:'$', display:false},
        ],
        throwOnError: false, strict: false
      });
    });
  }
}

// ── 我的答案编辑 ──
var _maOriginals = {};  // 存原始答案文本用于取消时恢复

function startEditMyAnswer(dbId) {
  var viewEl = document.getElementById('ma-view-' + dbId);
  var editEl = document.getElementById('ma-edit-' + dbId);
  var ta = document.getElementById('ma-ta-' + dbId);
  if (!viewEl || !editEl || !ta) return;
  // 获取纯文本（去掉 HTML 标签和图片）
  var rawText = (viewEl.textContent || '').trim();
  _maOriginals[dbId] = rawText;
  ta.value = rawText;
  viewEl.style.display = 'none';
  editEl.style.display = 'block';
  ta.focus();
}

function cancelMyAnswerEdit(dbId) {
  var viewEl = document.getElementById('ma-view-' + dbId);
  var editEl = document.getElementById('ma-edit-' + dbId);
  if (!viewEl || !editEl) return;
  editEl.style.display = 'none';
  viewEl.style.display = '';
}

function saveMyAnswerEdit(dbId) {
  var ta = document.getElementById('ma-ta-' + dbId);
  if (!ta) return;
  var newText = ta.value.trim();
  // 更新显示
  var viewEl = document.getElementById('ma-view-' + dbId);
  if (viewEl) {
    viewEl.innerHTML = newText.replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g, '<br>');
    if (typeof renderMathInElement !== 'undefined') {
      setTimeout(function() { renderMathInElement(viewEl, {delimiters:[{left:'$$',right:'$$',display:true},{left:'$',right:'$',display:false}],throwOnError:false,strict:false}); }, 50);
    }
  }
  // 隐藏编辑区
  var editEl = document.getElementById('ma-edit-' + dbId);
  if (editEl) editEl.style.display = 'none';
  if (viewEl) viewEl.style.display = '';
  // 通过 bridge 保存到数据库
  _saveAnswerViaBridge(dbId, newText);
}

function _saveAnswerViaBridge(dbId, newAnswer) {
  // 找到对应题目的数据
  var q = null;
  for (var i = 0; i < wrongQuestions.length; i++) {
    if (wrongQuestions[i].dbId === dbId) { q = wrongQuestions[i]; break; }
  }
  if (!q || !window.parent) return;
  var payload = JSON.stringify({
    action: 'save',
    payload: {
      question: q.question || '',
      subject: q.subjectLabel || q.subject || '数学',
      user_answer: newAnswer,
      correct_answer: q.correctAnswer || '',
      explanation: q.explanation || ''
    }
  });
  try {
    var ta = window.parent.document.querySelector('.st-key-__wb_action_bridge__ textarea');
    if (ta) {
      var setter = Object.getOwnPropertyDescriptor(window.parent.HTMLTextAreaElement.prototype, 'value').set;
      setter.call(ta, payload);
      ta.dispatchEvent(new Event('input', { bubbles: true }));
    }
  } catch(e) {}
}

function deleteCard(dbId) {
  if (!confirm('确定删除此错题？')) return;
  // 通过 Streamlit 生成的 class（st-key-wb_iframe_del_<id>）定位预渲染的隐藏删除按钮，
  // 直接 click() 触发 Streamlit 原生按钮回调执行真正的 DELETE。
  // 不再依赖 history.replaceState + st.query_params（replaceState 不触发 popstate，旧方案失效）。
  try {
    var container = window.parent.document.querySelector('.st-key-wb_iframe_del_' + dbId);
    if (container) {
      // st-key 通常加在 stElementContainer 外层 div 上，但也可能直接挂在 button 上
      var btn = container.tagName === 'BUTTON' ? container : container.querySelector('button');
      if (btn) { btn.click(); return; }
    }
  } catch (e) {
    console.error('错题删除桥接失败:', e);
  }
  // 兜底：提示用户使用页面上方的“管理错题”列表删除
  alert('删除失败，请使用页面上方的“管理错题”列表进行删除。');
}

// IMAGE NOTE HELPERS
// Format: [img:base64data] embedded in myAnswer text
// ══════════════════════════════════════
const IMG_NOTE_RE = /\[img:(data:image\/[^;]+;base64,[^\]]+)\]/g;

function stripImgNotes(text) {
  if (!text) return '';
  return text.replace(IMG_NOTE_RE, '').trim();
}

function renderImgNotes(text) {
  if (!text) return '';
  var imgs = [];
  var m;
  IMG_NOTE_RE.lastIndex = 0;
  while ((m = IMG_NOTE_RE.exec(text)) !== null) {
    imgs.push(m[1]);
  }
  if (!imgs.length) return '';
  return '<div class="img-note-thumbs">' +
    imgs.map(function(src, i) {
      return '<div class="img-note-wrap"><img class="img-note-thumb" src="' + src + '" onclick="event.stopPropagation();openLightbox(\'' + src + '\')" title="点击放大"><button class="img-note-del" onclick="event.stopPropagation();" title="此功能仅用于预览">✕</button></div>';
    }).join('') +
    '</div>';
}

// 渲染独立的 images 数组（新方案：图片与文字分离存储）
function renderImages(imgs) {
  if (!imgs || !imgs.length) return '';
  return '<div class="img-note-thumbs">' +
    imgs.map(function(src, i) {
      return '<div class="img-note-wrap"><img class="img-note-thumb" src="' + src + '" onclick="event.stopPropagation();openLightbox(\'' + src + '\')" title="点击放大"></div>';
    }).join('') +
    '</div>';
}

var cropState = { dragging: false, startX: 0, startY: 0, x: 0, y: 0, w: 0, h: 0 };

function handleFileSelect(e) {
  var file = e.target.files[0];
  if (!file) return;
  document.getElementById('uploadedFileName').textContent = '已上传: ' + file.name;
  document.getElementById('uploadedFileName').style.display = 'block';

  if (file.type.match(/^image\//)) {
    var reader = new FileReader();
    reader.onload = function(ev) {
      var img = document.getElementById('cropImage');
      img.src = ev.target.result;
      document.getElementById('cropSection').style.display = 'block';
      cropState = { dragging: false, startX: 0, startY: 0, x: 0, y: 0, w: 0, h: 0 };
      document.getElementById('cropRect').style.display = 'none';
      // Auto AI-extract after image loads
      img.onload = function() { setTimeout(aiExtractQuestion, 500); };
    };
    reader.readAsDataURL(file);
  } else {
    // Word/PDF — show message, can't extract from pure frontend
    document.getElementById('cropSection').style.display = 'none';
    alert('Word/PDF 文档暂不支持前端预览。请手动输入题目或粘贴截图。');
  }
}

// Crop: mouse drag on image
(function(){
  var container, img, rect;
  function init() {
    container = document.getElementById('cropContainer');
    img = document.getElementById('cropImage');
    rect = document.getElementById('cropRect');
    if (!container) return;
    container.addEventListener('mousedown', onDown);
    container.addEventListener('mousemove', onMove);
    container.addEventListener('mouseup', onUp);
    container.addEventListener('mouseleave', onUp);
  }
  function getPos(e) {
    var r = img.getBoundingClientRect();
    return { x: e.clientX - r.left, y: e.clientY - r.top };
  }
  function onDown(e) {
    if (!img.src) return;
    cropState.dragging = true;
    var p = getPos(e);
    cropState.startX = p.x;
    cropState.startY = p.y;
    e.preventDefault();
  }
  function onMove(e) {
    if (!cropState.dragging) return;
    var p = getPos(e);
    var x = Math.min(cropState.startX, p.x);
    var y = Math.min(cropState.startY, p.y);
    var w = Math.abs(p.x - cropState.startX);
    var h = Math.abs(p.y - cropState.startY);
    cropState.x = Math.max(0, x);
    cropState.y = Math.max(0, y);
    cropState.w = Math.min(w, img.clientWidth - cropState.x);
    cropState.h = Math.min(h, img.clientHeight - cropState.y);
    rect.style.display = 'block';
    rect.style.left = cropState.x + 'px';
    rect.style.top = cropState.y + 'px';
    rect.style.width = cropState.w + 'px';
    rect.style.height = cropState.h + 'px';
  }
  function onUp() {
    if (cropState.dragging && cropState.w > 20 && cropState.h > 20) {
      // Crop complete — extract crop region to canvas and send to AI
      var canvas = document.createElement('canvas');
      canvas.width = cropState.w;
      canvas.height = cropState.h;
      var ctx = canvas.getContext('2d');
      var scaleX = img.naturalWidth / img.clientWidth;
      var scaleY = img.naturalHeight / img.clientHeight;
      ctx.drawImage(img, cropState.x * scaleX, cropState.y * scaleY, cropState.w * scaleX, cropState.h * scaleY, 0, 0, cropState.w, cropState.h);
      // Convert cropped image to base64 for AI
      cropState.croppedDataUrl = canvas.toDataURL('image/jpeg', 0.75);
      aiExtractQuestion();
    }
    cropState.dragging = false;
  }
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
  } else {
    init();
  }
})();

function handleImgNoteSelect(e) {
  var files = e.target.files;
  if (!files.length) return;
  Array.prototype.forEach.call(files, function(file) {
    if (!file.type.match(/^image\//)) return;
    var reader = new FileReader();
    reader.onload = function(ev) {
      // Compress to thumbnail — 保持足够清晰度供手写笔记辨认
      var img = new Image();
      img.onload = function() {
        var canvas = document.createElement('canvas');
        var maxW = 1000;
        var scale = Math.min(1, maxW / img.width);
        canvas.width = img.width * scale;
        canvas.height = img.height * scale;
        var ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
        var thumb = canvas.toDataURL('image/jpeg', 0.85);
        modalImgNotes.push(thumb);
        renderModalImgNotes();
      };
      img.src = ev.target.result;
    };
    reader.readAsDataURL(file);
  });
  e.target.value = '';
}

function renderModalImgNotes() {
  var container = document.getElementById('imgNoteThumbs');
  container.innerHTML = modalImgNotes.map(function(src, i) {
    return '<div class="img-note-wrap"><img class="img-note-thumb" src="' + src + '" onclick="openLightbox(\'' + src + '\')" title="点击放大"><button class="img-note-del" onclick="removeModalImgNote(' + i + ')">✕</button></div>';
  }).join('');
}

function removeModalImgNote(i) {
  modalImgNotes.splice(i, 1);
  renderModalImgNotes();
}

// ══════════════════════════════════════
// AI GENERATION (via Streamlit hidden button)
// ══════════════════════════════════════
var ocrRequestSeq = 0;
var ocrAbortController = null;

function aiExtractQuestion() {
  function extractOcrQuestion(message) {
    var content = message && message.content;
    if (typeof content !== 'string') return '';
    var match = content.match(/^\s*<question>\s*([\s\S]*?)\s*<\/question>\s*$/i);
    if (!match || !match[1].trim()) return '';
    var question = match[1].trim();
    if (/<think|用户要求|我需要先|让我先|思考过程|the user|i need to|let's think/i.test(question)) return '';
    return question;
  }

  // If user has cropped image, use cropped version; otherwise use full image
  var imgData = (cropState.croppedDataUrl) || (document.getElementById('cropImage').src);
  if (!imgData || !imgData.startsWith('data:image/')) return;
  var requestSeq = ++ocrRequestSeq;
  if (ocrAbortController) ocrAbortController.abort();
  ocrAbortController = typeof AbortController !== 'undefined' ? new AbortController() : null;

  // Compress image for API transfer (max 1024px, JPEG quality 70%)
  var img = new Image();
  img.onload = function() {
    if (requestSeq !== ocrRequestSeq) return;
    var canvas = document.createElement('canvas');
    var maxDim = 1024;
    var scale = Math.min(1, maxDim / Math.max(img.width, img.height));
    canvas.width = img.width * scale;
    canvas.height = img.height * scale;
    var ctx = canvas.getContext('2d');
    ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
    var compressed = canvas.toDataURL('image/jpeg', 0.7);

    var qEl = document.getElementById('addQuestion');
    if (!sendToStreamlitImage(compressed) && !qEl.value.trim()) {
      qEl.placeholder = '图片识别通道不可用，请刷新后重试';
    }
    return;
    qEl.placeholder = 'AI 正在识别图片中的题目...';

    // 直接在 iframe 内调用 AI API，不依赖 Streamlit textarea 桥接
    if (false) {
      qEl.placeholder = 'API 配置缺失，请手动输入题目';
      alert('图片识别失败：API 配置缺失。请手动输入题目。');
      return;
    }
    var requestOptions = {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'mimo-v2.5',
        messages: [{ role: 'user', content: [
          { type: 'text', text: 'OCR CONTRACT: Output exactly one <question>...</question> block and nothing else. Copy only the original question, all conditions and options. Never output reasoning, analysis, an answer, explanation, greeting, markdown, or inferred content. Put mathematics in LaTeX. If no question is visible, output <question></question>.' },
          { type: 'image_url', image_url: { url: compressed } }
        ]}],
        max_tokens: 1000, temperature: 0.1
      })
    };
    if (ocrAbortController) requestOptions.signal = ocrAbortController.signal;
    fetch('/chat/completions', requestOptions).then(function(r) {
      if (!r.ok) throw new Error('HTTP ' + r.status);
      return r.json();
    }).then(function(data) {
      if (requestSeq !== ocrRequestSeq) return;
      var text = '';
      try { text = extractOcrQuestion(data.choices[0].message); } catch(e) {}
      if (!text) {
        if (!qEl.value.trim()) qEl.placeholder = '没有识别到完整题干，请重新框选或手动输入';
        return;
      }
      qEl.value = text;
      updateQuestionPreview();
      qEl.placeholder = '';
    }).catch(function(e) {
      if (requestSeq !== ocrRequestSeq || (e && e.name === 'AbortError')) return;
      if (!qEl.value.trim()) qEl.placeholder = '识别失败，请重新框选或手动输入';
    });
  };
  img.onerror = function() {
    if (requestSeq === ocrRequestSeq) {
      var qEl = document.getElementById('addQuestion');
      if (!qEl.value.trim()) qEl.placeholder = '图片读取失败，请重新上传';
    }
  };
  img.src = imgData;
}

// ── 客户端清洗 MiMo 思维链输出（与服务端 _clean_mimo_output 同逻辑）──
function _cleanAIOutput(text) {
  if (!text || text.length < 5) return text;
  var t = text.trim();

  // 1. 找答案起始标记，截取之后的内容
  var markers = ['正式回答','给出答案','输出如下','答案如下','解答如下','最终答案','回答如下','现在回答','开始答题','[题目]','[解答]','[答案]','Answer:','Solution:','Here is'];
  var bestPos = t.length + 1;
  for (var i = 0; i < markers.length; i++) {
    var pos = t.indexOf(markers[i]);
    if (pos !== -1 && pos < bestPos) bestPos = pos;
  }
  if (bestPos < t.length && bestPos > 0) {
    var lineStart = t.lastIndexOf('\n', bestPos);
    t = lineStart !== -1 ? t.substring(lineStart + 1) : t.substring(bestPos);
  }

  // 2. 行级过滤：去掉思考/推理行
  var thinkStarts = ['好的','让我','首先','根据','综上','因此','注意','这个','该知','我们','需要','可以','这里','现在','接下来','最后','总的','所以','Okay','Let','First','I need','The user','用户','问题是','题目是','要解','已知','分析','考虑','理解','回顾','判断','比较','计算','推导','综合','综上所','让我来','我来','我明白','收到','嗯','好，','首先，','接下来，','最后，','然后，','接着，','根据题目','从题目','由题意','观察','对比','得到','这道题','此题','该题','本题','考察','涉及','属于','目的是','目标是','任务是','要求是'];
  var thinkKeywords = ['知识点是','用户要求','定义如下','给出答案','任务是','需要生成','我的思考','思路如下','步骤是','解题思路','推理过程','思考过程','分析如下','详细说明','解释如下','我来分析','逐步思考','逐步分析'];
  var lines = t.split('\n');
  var cleanLines = [];
  for (var i = 0; i < lines.length; i++) {
    var s = lines[i].trim();
    if (!s) { cleanLines.push(lines[i]); continue; }
    var isThink = false;
    for (var j = 0; j < thinkStarts.length; j++) {
      if (s.substring(0, thinkStarts[j].length) === thinkStarts[j]) { isThink = true; break; }
    }
    if (!isThink) {
      for (var k = 0; k < thinkKeywords.length; k++) {
        if (s.indexOf(thinkKeywords[k]) !== -1) { isThink = true; break; }
      }
    }
    if (isThink) continue;
    cleanLines.push(lines[i]);
  }
  if (cleanLines.length === 0 || cleanLines.filter(function(l){return l.trim();}).length === 0) return t;
  return cleanLines.join('\n');
}

function parseStrictAiAnswer(text) {
  if (typeof text !== 'string') return null;
  var cleaned = text.replace(/^\s*```(?:xml|html|text)?\s*|\s*```\s*$/gi, '');
  var match = cleaned.match(/<answer>\s*([\s\S]*?)\s*<\/answer>\s*<explanation>\s*([\s\S]*?)\s*<\/explanation>/i);
  if (match) {
    var combined = (match[1].trim() + '\n\n' + match[2].trim()).trim();
    return parseSafeAiAnswerFallback(combined);
  }
  match = cleaned.match(/<answer>\s*([\s\S]*?)\s*<\/answer>/i);
  if (match) return parseSafeAiAnswerFallback(match[1]);
  return parseSafeAiAnswerFallback(cleaned);
}

function parseSafeAiAnswerFallback(text) {
  var answer = (text || '').replace(/<\/?(?:answer|explanation|description)>/gi, '').trim();
  var reasoningLeak = /<think|reasoning_content|用户要求|我需要先|让我先|我的思考|思考过程|分析一下用户|the user|i need to|let's think|we need to|internal reasoning/i;
  if (!answer || answer.length > 3000 || reasoningLeak.test(answer)) return null;
  return { answer: answer, explanation: '' };
}

function aiGenerateAnswer() {
  var question = document.getElementById('addQuestion').value.trim();
  var subject = document.getElementById('addSubject').value;
  var myAnswer = document.getElementById('addMyAnswer').value.trim();
  if (!question) { alert('请先输入或识别题目'); return; }

  var btn = event.target;
  var origText = btn.textContent;
  btn.textContent = '✨ AI 生成中...';
  btn.disabled = true;

  if (!sendToStreamlitAction({
    action: 'ai_generate', question: question, subject: subject, myAnswer: myAnswer
  })) {
    btn.textContent = origText;
    btn.disabled = false;
    alert('AI 生成通道不可用，请刷新后重试。');
  }
  return;

  // 直接在 iframe 内调用 AI API
  fetch('/chat/completions', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      model: 'mimo-v2.5',
      messages: [
        { role: 'system', content: 'You are a tutoring result formatter. Never reveal private reasoning or internal analysis. Return only one final answer for the student.' },
        { role: 'user', content: '请解答下面的考研题目。\n\n【硬性输出协议】\n优先只输出：<answer>完整解答</answer>。\n完整解答应包含最终答案和面向学生的简洁解析，二者合并为一段内容。\n禁止输出内部思考、任务分析、用户意图、自言自语、<think>、Markdown 代码块或提示词复述。\n数学公式使用 LaTeX。\n\n科目：' + subject + '\n题目：' + question + '\n学生错误答案：' + (myAnswer || '无')}
      ],
      max_tokens: 2800,
      temperature: 0.15
    })
  }).then(function(r) {
    if (!r.ok) throw new Error('HTTP ' + r.status);
    return r.json();
  }).then(function(data) {
    var text = '';
    try {
      var msg = data.choices[0].message;
      var c = msg.content;
      text = (typeof c === 'string' && c) ? c : '';
    } catch(e) {}
    var parsed = parseStrictAiAnswer(text);
    if (!parsed) {
      alert('AI 未返回可安全展示的最终解答，请稍后再试。');
      return;
    }
    document.getElementById('aiCorrectAnswer').textContent = parsed.answer;
    document.getElementById('aiExplanation').textContent = '';
    document.getElementById('aiExplanation').parentElement.style.display = 'none';
    document.getElementById('aiResultSection').style.display = 'block';
    if (typeof renderMathInElement !== 'undefined') {
      renderMathInElement(document.getElementById('aiResultSection'), {
        delimiters: [{left:'$$', right:'$$', display:false},{left:'$', right:'$', display:false}],
        throwOnError: false, strict: false
      });
    }
  }).catch(function(e) {
    alert('AI 生成失败: ' + e.message);
  }).finally(function() {
    btn.textContent = origText;
    btn.disabled = false;
  });
}

function saveNewQuestion() {
  var question = document.getElementById('addQuestion').value.trim();
  var myAnswer = document.getElementById('addMyAnswer').value.trim();
  var subject = document.getElementById('addSubject').value;
  var errorCount = parseInt(document.getElementById('addErrorCount').value) || 1;
  var btn = (typeof event !== 'undefined' && event.currentTarget) ? event.currentTarget : null;
  var originalText = btn ? btn.textContent : '';
  if (!question) { alert('请输入题目'); return; }
  if (btn) {
    btn.disabled = true;
    btn.textContent = '保存中...';
  }

  var correctAnswer = document.getElementById('aiCorrectAnswer').textContent.trim();
  var explanation = document.getElementById('aiExplanation').textContent.trim();
  var images = modalImgNotes.slice();
  var payload = {
    subject: subject, question: question, myAnswer: myAnswer,
    correctAnswer: correctAnswer, explanation: explanation,
    errorCount: errorCount, images: images
  };

  // 图片走 POST 请求体，不进入 Streamlit widget/URL，避免大 Base64 撑爆状态消息。
  _saveTextViaBridge(payload, btn, originalText);
  return;

  if (false) {
    fetch('/wb_save', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    }).then(function(r) {
      return r.json().then(function(data) {
        if (!r.ok || !data.success) throw new Error(data.error || ('HTTP ' + r.status));
        return data;
      });
    }).then(function() {
      sessionStorage.removeItem('__wb_modal_state__');
      closeAddModal();
      try {
        var container = window.parent.document.querySelector('.st-key-__wb_refresh__');
        if (container) {
          var refreshBtn = container.querySelector('button');
          if (refreshBtn) { refreshBtn.click(); return; }
        }
      } catch (e) {}
      alert('保存成功，请刷新页面查看。');
    }).catch(function(e) {
      if (images.length > 0) {
        if (btn) { btn.disabled = false; btn.textContent = originalText; }
        alert('保存失败：' + e.message + '\n图片不会通过文本桥接传输，请保留当前页面并重试。');
        return;
      }
      _saveTextViaBridge(payload, btn, originalText);
    });
    return;
  }

  if (images.length > 0) {
    if (btn) { btn.disabled = false; btn.textContent = originalText; }
    alert('图片保存服务未启动。图片不会通过文本桥接传输，请重启应用后重试。');
    return;
  }
  _saveTextViaBridge(payload, btn, originalText);
}

function _saveTextViaBridge(payload, btn, originalText) {
  var bridgePayload = JSON.stringify({ action: 'save', payload: payload });
  try {
    var bridge = window.parent.document.querySelector('.st-key-__wb_action_bridge__ textarea');
    if (bridge) {
      var setter = Object.getOwnPropertyDescriptor(window.parent.HTMLTextAreaElement.prototype, 'value').set;
      setter.call(bridge, bridgePayload);
      bridge.dispatchEvent(new Event('input', { bubbles: true }));
      bridge.dispatchEvent(new Event('change', { bubbles: true }));
      return;
    }
  } catch (e) {}
  if (btn) { btn.disabled = false; btn.textContent = originalText; }
  alert('保存通道不可用，请重启应用后重试。');
}

function _fallbackUrlSave(subject, question, myAnswer, correctAnswer, explanation, errorCount, btn, originalText) {
  _saveTextViaBridge({
    subject: subject, question: question, myAnswer: myAnswer,
    correctAnswer: correctAnswer, explanation: explanation,
    errorCount: errorCount, images: []
  }, btn, originalText);
}

// DRAG & DROP for upload zone
// ══════════════════════════════════════
(function(){
  var zone = document.getElementById('uploadZone');
  if (!zone) return;
  zone.addEventListener('dragover', function(e) { e.preventDefault(); zone.classList.add('drag-over'); });
  zone.addEventListener('dragleave', function() { zone.classList.remove('drag-over'); });
  zone.addEventListener('drop', function(e) {
    e.preventDefault();
    zone.classList.remove('drag-over');
    var file = e.dataTransfer.files[0];
    if (file) {
      var input = document.getElementById('fileInput');
      var dt = new DataTransfer();
      dt.items.add(file);
      input.files = dt.files;
      handleFileSelect({ target: input });
    }
  });
})();

function toggleCard(id) {
  const card = document.getElementById(id);
  if (!card) return;
  card.classList.toggle('expanded');
  // Re-render KaTeX inside expanded detail — must happen AFTER display:block is applied
  if (card.classList.contains('expanded') && typeof renderMathInElement !== 'undefined') {
    requestAnimationFrame(() => {
      requestAnimationFrame(() => {
        renderMathInElement(card, {
          delimiters: [
            {left:'$$', right:'$$', display:true},
            {left:'$', right:'$', display:false},
          ],
          throwOnError: false, strict: false
        });
      });
    });
  }
}
